<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mathe-Pingpong</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #7dd3fc, #a5f3fc, #fef3c7);
      color: #0f172a;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .hidden {
      display: none !important;
    }

    .start-screen {
      width: 100vw;
      height: 100vh;
      padding: 1.5vh 2vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-card {
      width: min(100%, 1280px);
      height: 94vh;
      border: 8px solid white;
      border-radius: 48px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 24px 70px rgba(15,23,42,0.24);
      padding: clamp(12px, 2vh, 22px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5.5vw, 68px);
      color: #ec4899;
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 4px 0 rgba(255,255,255,0.9);
    }

    .subtitle {
      margin: 8px 0 0;
      color: #075985;
      font-size: clamp(17px, 2.4vw, 27px);
      font-weight: 900;
    }

    .panel {
      border-radius: 32px;
      padding: clamp(10px, 1.5vh, 16px);
      background: #fce7f3;
    }

    .panel.yellow {
      background: #fef9c3;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: clamp(22px, 2.7vw, 34px);
      font-weight: 1000;
      color: #ec4899;
    }

    .panel.yellow h2 {
      color: #f97316;
    }

    .table-buttons {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 8px;
    }

    .time-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .select-btn,
    .mode-btn {
      border: 4px solid white;
      border-radius: 24px;
      background: white;
      color: #0369a1;
      padding: clamp(8px, 1.5vh, 16px);
      font-size: clamp(22px, 2.8vw, 34px);
      font-weight: 1000;
      box-shadow: 0 7px 0 rgba(15,23,42,0.12);
    }

    .select-btn.active {
      background: #f472b6;
      border-color: #ec4899;
      color: white;
    }

    .mode-btn.active {
      background: #fdba74;
      border-color: #f97316;
      color: white;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .info-box {
      border-radius: 28px;
      padding: clamp(10px, 1.4vh, 15px);
      font-size: clamp(16px, 2vw, 22px);
      font-weight: 1000;
      box-shadow: 0 8px 20px rgba(15,23,42,0.12);
    }

    .info-box:nth-child(1) { background: #fde68a; }
    .info-box:nth-child(2) { background: #bbf7d0; }
    .info-box:nth-child(3) { background: #bfdbfe; }

    .main-btn {
      width: 100%;
      height: clamp(58px, 10vh, 84px);
      border: 0;
      border-radius: 32px;
      background: #ec4899;
      color: white;
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 1000;
      box-shadow: 0 10px 0 #be185d;
    }

    .main-btn:active,
    .select-btn:active,
    .mode-btn:active,
    .answer-btn:active {
      transform: translateY(3px);
    }

    .game-screen {
      width: 100vw;
      height: 100vh;
      padding: 4vh 2vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .table {
      position: relative;
      width: min(1500px, 96vw);
      height: 92vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      border: 12px solid white;
      border-radius: 48px;
      background: linear-gradient(90deg, #38bdf8, #34d399, #22d3ee);
      box-shadow: 0 25px 70px rgba(15,23,42,0.3);
    }

    .player-side {
      position: relative;
      height: 100%;
      width: 38vw;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform-origin: center;
    }

    .player-side.left {
      transform: rotate(90deg);
    }

    .player-side.right {
      transform: rotate(-90deg);
    }

    .score {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 76px;
      border: 4px solid white;
      border-radius: 999px;
      background: #f472b6;
      color: white;
      padding: 10px 24px;
      font-size: clamp(30px, 4vw, 42px);
      font-weight: 1000;
      box-shadow: 0 8px 24px rgba(15,23,42,0.18);
      text-align: center;
    }

    .task-card {
      width: min(92%, 570px);
      min-height: 330px;
      border: 6px solid white;
      border-radius: 40px;
      padding: 22px;
      text-align: center;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 20px 60px rgba(15,23,42,0.2);
    }

    .task-card.active {
      background: #e0f2fe;
      border-color: #fde047;
    }

    .label {
      font-size: clamp(16px, 1.8vw, 21px);
      font-weight: 1000;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #ec4899;
    }

    .task {
      margin: 18px 0;
      font-size: clamp(58px, 8vw, 86px);
      line-height: 1;
      color: #075985;
      font-weight: 1000;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .answer-btn {
      height: 96px;
      border: 4px solid white;
      border-radius: 32px;
      background: linear-gradient(#fde047, #fdba74);
      color: #075985;
      font-size: clamp(36px, 4.8vw, 52px);
      font-weight: 1000;
      box-shadow: 0 8px 0 rgba(15,23,42,0.16);
    }

    .waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 230px;
      gap: 14px;
      font-size: 72px;
    }

    .waiting-text {
      font-size: clamp(27px, 3.2vw, 38px);
      font-weight: 1000;
      color: #7dd3fc;
    }

    .feedback {
      margin-top: 18px;
      height: 46px;
      font-size: clamp(22px, 2.8vw, 30px);
      font-weight: 1000;
      color: white;
      text-shadow: 0 3px 8px rgba(15,23,42,0.3);
      text-align: center;
    }

    .net {
      position: relative;
      height: 100%;
      width: 20vw;
      min-width: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 10px dashed rgba(255,255,255,0.7);
      border-right: 10px dashed rgba(255,255,255,0.7);
      background: rgba(16,185,129,0.28);
    }

    .net-line {
      position: absolute;
      left: 50%;
      top: 0;
      width: 8px;
      height: 100%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.7);
    }

    .timer {
      position: absolute;
      top: 26px;
      z-index: 3;
      border: 4px solid white;
      border-radius: 999px;
      background: #f87171;
      color: white;
      padding: 12px 26px;
      font-size: clamp(34px, 4vw, 46px);
      font-weight: 1000;
      box-shadow: 0 8px 24px rgba(15,23,42,0.2);
    }

    .net-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .bounce {
      font-size: clamp(76px, 9vw, 106px);
      animation: bounce 0.9s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    .ping-box {
      border-radius: 28px;
      background: rgba(255,255,255,0.85);
      padding: 16px 26px;
      font-size: clamp(22px, 2.5vw, 30px);
      color: #059669;
      font-weight: 1000;
      box-shadow: 0 8px 24px rgba(15,23,42,0.16);
    }

    .end-screen {
      width: 100vw;
      height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .end-card {
      width: min(90vw, 780px);
      border: 8px solid white;
      border-radius: 48px;
      background: rgba(255,255,255,0.92);
      padding: 42px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(15,23,42,0.24);
    }

    .end-card h2 {
      margin: 0;
      font-size: clamp(42px, 6vw, 70px);
      color: #ec4899;
      font-weight: 1000;
    }

    .end-score {
      margin: 18px 0;
      font-size: clamp(28px, 4vw, 38px);
      color: #0369a1;
      font-weight: 1000;
    }

    @media (max-height: 720px) {
      .start-card {
        padding: 12px;
      }

      .panel {
        padding: 10px;
      }

      .info-box {
        padding: 9px;
      }

      .main-btn {
        height: 58px;
      }
    }

    @media (max-width: 900px) {
      .table-buttons {
        grid-template-columns: repeat(5, 1fr);
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section id="startScreen" class="start-screen">
    <div class="start-card">
      <div>
        <h1>🏓 Mathe-Pingpong 🏓</h1>
        <p class="subtitle">Setzt euch links und rechts ans Tablet wie an eine echte Tischtennisplatte!</p>
      </div>

      <div class="panel">
        <h2>Welche Reihen wollt ihr üben?</h2>
        <div id="tableButtons" class="table-buttons"></div>
      </div>

      <div class="panel yellow">
        <h2>Zeitmodus</h2>
        <div class="time-buttons">
          <button id="modeOff" class="mode-btn active">Ohne Zeitlimit</button>
          <button id="mode5" class="mode-btn">5 Sekunden</button>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">👦 Spieler links</div>
        <div class="info-box">🏓 Tablet wie Tischtennisplatte hinlegen</div>
        <div class="info-box">👧 Spieler rechts</div>
      </div>

      <button id="startButton" class="main-btn">SPIEL STARTEN</button>
    </div>
  </section>

  <section id="gameScreen" class="game-screen hidden">
    <main class="table">
      <div class="player-side left">
        <div id="scoreLeft" class="score">0</div>
        <div id="cardLeft" class="task-card"></div>
        <div id="feedbackLeft" class="feedback"></div>
      </div>

      <div class="net">
        <div id="timer" class="timer hidden">⏰ 5</div>
        <div class="net-line"></div>
        <div class="net-content">
          <div class="bounce">🏓</div>
          <div class="ping-box">Ping! Pong!</div>
        </div>
      </div>

      <div class="player-side right">
        <div id="scoreRight" class="score">0</div>
        <div id="cardRight" class="task-card"></div>
        <div id="feedbackRight" class="feedback"></div>
      </div>
    </main>
  </section>

  <section id="endScreen" class="end-screen hidden">
    <div class="end-card">
      <div style="font-size: 90px;">🏆</div>
      <h2 id="winnerText">Spieler gewinnt!</h2>
      <div id="finalScore" class="end-score"></div>
      <button id="restartButton" class="main-btn">NOCHMAL SPIELEN</button>
    </div>
  </section>

  <script>
    const TABLES = [2,3,4,5,6,7,8,9,10];
    const WIN_SCORE = 10;

    let selectedTables = [2,3,4,5,10];
    let timeMode = "off";
    let activePlayer = "left";
    let task = null;
    let score = { left: 0, right: 0 };
    let feedback = { left: "", right: "" };
    let timerInterval = null;
    let timeLeft = 5;
    let roundResolved = false;

    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const endScreen = document.getElementById("endScreen");

    const tableButtons = document.getElementById("tableButtons");
    const modeOff = document.getElementById("modeOff");
    const mode5 = document.getElementById("mode5");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");

    const scoreLeft = document.getElementById("scoreLeft");
    const scoreRight = document.getElementById("scoreRight");
    const cardLeft = document.getElementById("cardLeft");
    const cardRight = document.getElementById("cardRight");
    const feedbackLeft = document.getElementById("feedbackLeft");
    const feedbackRight = document.getElementById("feedbackRight");
    const timer = document.getElementById("timer");
    const winnerText = document.getElementById("winnerText");
    const finalScore = document.getElementById("finalScore");

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function createTask() {
      const a = selectedTables[randomInt(0, selectedTables.length - 1)];
      const b = randomInt(2, 10);
      const correct = a * b;
      const wrong = new Set();

      while (wrong.size < 2) {
        const value = correct + randomInt(-10, 10);
        if (value !== correct && value > 0) wrong.add(value);
      }

      return {
        question: `${a} · ${b}`,
        correct,
        answers: shuffle([correct, ...wrong])
      };
    }

    function renderTableButtons() {
      tableButtons.innerHTML = "";
      TABLES.forEach(table => {
        const button = document.createElement("button");
        button.className = "select-btn" + (selectedTables.includes(table) ? " active" : "");
        button.textContent = table + "·";
        button.addEventListener("click", () => {
          if (selectedTables.includes(table) && selectedTables.length > 1) {
            selectedTables = selectedTables.filter(t => t !== table);
          } else if (!selectedTables.includes(table)) {
            selectedTables.push(table);
            selectedTables.sort((a, b) => a - b);
          }
          renderTableButtons();
        });
        tableButtons.appendChild(button);
      });
    }

    function setMode(mode) {
      timeMode = mode;
      modeOff.classList.toggle("active", mode === "off");
      mode5.classList.toggle("active", mode === "5s");
    }

    function showScreen(which) {
      startScreen.classList.toggle("hidden", which !== "start");
      gameScreen.classList.toggle("hidden", which !== "game");
      endScreen.classList.toggle("hidden", which !== "end");
    }

    function renderPlayerCard(side) {
      const active = activePlayer === side;
      const card = side === "left" ? cardLeft : cardRight;

      card.className = "task-card" + (active ? " active" : "");

      if (active) {
        card.innerHTML = `
          <div class="label">Tippe die richtige Antwort!</div>
          <div class="task">${task.question}</div>
          <div class="answers">
            ${task.answers.map(answer => `
              <button class="answer-btn" data-answer="${answer}">${answer}</button>
            `).join("")}
          </div>
        `;

        card.querySelectorAll(".answer-btn").forEach(button => {
          button.addEventListener("click", () => handleAnswer(Number(button.dataset.answer)));
        });
      } else {
        card.innerHTML = `
          <div class="label">Warte auf den Ball</div>
          <div class="waiting">
            <div>🏓</div>
            <div class="waiting-text">Bereit machen!</div>
          </div>
        `;
      }
    }

    function renderGame() {
      scoreLeft.textContent = score.left;
      scoreRight.textContent = score.right;
      feedbackLeft.textContent = feedback.left || "";
      feedbackRight.textContent = feedback.right || "";

      renderPlayerCard("left");
      renderPlayerCard("right");

      timer.classList.toggle("hidden", timeMode !== "5s");
      timer.textContent = `⏰ ${timeLeft}`;
    }

    function startTimer() {
      clearInterval(timerInterval);

      if (timeMode !== "5s") {
        timer.classList.add("hidden");
        return;
      }

      timeLeft = 5;
      timer.textContent = `⏰ ${timeLeft}`;
      timer.classList.remove("hidden");

      timerInterval = setInterval(() => {
        if (roundResolved) return;

        timeLeft -= 1;
        timer.textContent = `⏰ ${timeLeft}`;

        if (timeLeft <= 0) {
          resolveRound(false, true);
        }
      }, 1000);
    }

    function startGame() {
      score = { left: 0, right: 0 };
      feedback = { left: "Los geht's!", right: "" };
      activePlayer = Math.random() > 0.5 ? "left" : "right";
      task = createTask();
      roundResolved = false;
      showScreen("game");
      renderGame();
      startTimer();
    }

    function nextTurn(other, delay) {
      setTimeout(() => {
        activePlayer = other;
        task = createTask();
        roundResolved = false;
        feedback = {
          ...feedback,
          [other]: feedback[other] || "Du bist dran!"
        };
        renderGame();
        startTimer();
      }, delay);
    }

    function endGame() {
      clearInterval(timerInterval);
      const winner = score.left >= WIN_SCORE ? "links" : "rechts";
      winnerText.textContent = `Spieler ${winner} gewinnt!`;
      finalScore.textContent = `Links ${score.left} : ${score.right} Rechts`;
      showScreen("end");
    }

    function resolveRound(correctAnswer, timeout = false) {
      if (roundResolved) return;
      roundResolved = true;
      clearInterval(timerInterval);

      const player = activePlayer;
      const other = player === "left" ? "right" : "left";

      if (correctAnswer) {
        score[player] += 1;
        feedback[player] = "🏓 Super!";
        feedback[other] = "Der Ball kommt!";
      } else {
        score[other] += 1;
        feedback[player] = timeout ? "⏰ Zu langsam!" : `❌ ${task.correct} wäre richtig!`;
        feedback[other] = "🎉 Punkt für dich!";
      }

      renderGame();

      if (score.left >= WIN_SCORE || score.right >= WIN_SCORE) {
        setTimeout(endGame, 500);
        return;
      }

      nextTurn(other, correctAnswer ? 400 : 700);
    }

    function handleAnswer(answer) {
      resolveRound(answer === task.correct, false);
    }

    modeOff.addEventListener("click", () => setMode("off"));
    mode5.addEventListener("click", () => setMode("5s"));
    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", startGame);

    renderTableButtons();
    setMode("off");
  </script>
</body>
</html>
