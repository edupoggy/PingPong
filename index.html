<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Mathe-Pingpong</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,Arial,sans-serif;background:linear-gradient(135deg,#67e8f9,#bbf7d0,#fde68a);color:#0f172a}
button{font-family:inherit;touch-action:manipulation;cursor:pointer}
.hidden{display:none!important}
.start,.end{width:100vw;height:100vh;padding:1.5vh 2vw;display:flex;align-items:center;justify-content:center}
.card{width:min(100%,1280px);height:94vh;border:8px solid #fff;border-radius:48px;background:rgba(255,255,255,.93);box-shadow:0 24px 70px #0003;padding:clamp(12px,2vh,22px);display:flex;flex-direction:column;justify-content:space-between;text-align:center;overflow:hidden}
.end .card{width:min(90vw,820px);height:auto;padding:42px}
h1{margin:0;font-size:clamp(34px,5.5vw,68px);color:#0f766e;font-weight:1000;line-height:1;text-shadow:0 4px 0 #fff}
.subtitle{margin:8px 0 0;color:#1e3a8a;font-size:clamp(17px,2.4vw,27px);font-weight:900}
.panel{border-radius:32px;padding:clamp(10px,1.5vh,16px);background:#ccfbf1}
.panel.yellow{background:#fef9c3}
.panel h2{margin:0 0 8px;font-size:clamp(22px,2.7vw,34px);font-weight:1000;color:#0f766e}
.panel.yellow h2{color:#2563eb}
.tableBtns{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}
.timeBtns{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sel,.mode{border:4px solid #fff;border-radius:24px;background:#fff;color:#2563eb;padding:clamp(8px,1.3vh,14px);font-size:clamp(17px,2.2vw,28px);font-weight:1000;box-shadow:0 7px 0 #0002}
.sel.active{background:#14b8a6;border-color:#0f766e;color:#fff}
.mode.active{background:#facc15;border-color:#2563eb;color:#fff}
.info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.info div{border-radius:28px;padding:clamp(10px,1.4vh,15px);font-size:clamp(16px,2vw,22px);font-weight:1000;box-shadow:0 8px 20px #0002}
.info div:nth-child(1){background:#bfdbfe}.info div:nth-child(2){background:#bbf7d0}.info div:nth-child(3){background:#fde68a}
.main{width:100%;height:clamp(58px,10vh,84px);border:0;border-radius:32px;background:#0f766e;color:#fff;font-size:clamp(28px,4vw,46px);font-weight:1000;box-shadow:0 10px 0 #0f766e}
.main:active,.sel:active,.mode:active,.ans:active{transform:translateY(3px)}

.game{width:100vw;height:100vh;padding:4vh 2vw;display:flex;align-items:center;justify-content:center}
.plate{position:relative;width:min(1500px,96vw);height:92vh;display:flex;align-items:center;justify-content:space-between;overflow:hidden;border:12px solid #fff;border-radius:48px;background:linear-gradient(90deg,#60a5fa,#4ade80,#60a5fa);box-shadow:0 25px 70px #0004}
.side{position:relative;height:100%;width:38vw;min-width:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;transform-origin:center}
.left{transform:rotate(90deg)}
.right{transform:rotate(-90deg)}
.score{position:absolute;top:16px;left:50%;transform:translateX(-50%);min-width:76px;border:4px solid #fff;border-radius:999px;background:#14b8a6;color:#fff;padding:10px 24px;font-size:clamp(30px,4vw,42px);font-weight:1000;box-shadow:0 8px 24px #0003;text-align:center}
.plateScore{z-index:5;transform:none}.scoreLeft{left:28%;top:16px}.scoreRight{left:auto;right:28%;top:16px}
.taskCard{width:min(92%,570px);min-height:330px;border:6px solid #fff;border-radius:40px;padding:22px;text-align:center;background:rgba(255,255,255,.75);box-shadow:0 20px 60px #0003}
.taskCard.active{background:#e0f2fe;border-color:#fde047}
.label{font-size:clamp(16px,1.8vw,21px);font-weight:1000;text-transform:uppercase;color:#0f766e}
.task{margin:18px 0;font-size:clamp(58px,8vw,86px);line-height:1;color:#1e3a8a;font-weight:1000}
.answers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ans{height:96px;border:4px solid #fff;border-radius:32px;background:linear-gradient(#fde047,#facc15);color:#1e3a8a;font-size:clamp(36px,4.8vw,52px);font-weight:1000;box-shadow:0 8px 0 #0002}
.wait{display:flex;flex-direction:column;align-items:center;justify-content:center;height:230px;gap:14px;font-size:72px}
.wait span{font-size:clamp(27px,3.2vw,38px);font-weight:1000;color:#67e8f9}
.fb{margin-top:18px;height:46px;font-size:clamp(22px,2.8vw,30px);font-weight:1000;color:#fff;text-shadow:0 3px 8px #0005;text-align:center}
.net{position:relative;height:100%;width:20vw;min-width:220px;display:flex;align-items:center;justify-content:center;border-left:10px dashed #ffffffb3;border-right:10px dashed #ffffffb3;background:rgba(16,185,129,.28)}
.line{position:absolute;left:50%;top:0;width:8px;height:100%;transform:translateX(-50%);background:#ffffffb3}
.timer{position:absolute;top:26px;z-index:3;border:4px solid #fff;border-radius:999px;background:#f87171;color:#fff;padding:12px 26px;font-size:clamp(34px,4vw,46px);font-weight:1000}
.netbox{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:22px}

.flyingBall{
position:absolute;
z-index:8;
left:50%;
top:50%;
width:clamp(42px,5vw,72px);
height:clamp(42px,5vw,72px);
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(30px,4vw,54px);
background:#fde047;
border:4px solid #fff;
box-shadow:0 10px 24px #0004;
transform:translate(-50%,-50%);
pointer-events:none;
opacity:0;
}
.flyingBall.flyLeftToRight{
animation:flyLTR .55s ease-in-out forwards;
}
.flyingBall.flyRightToLeft{
animation:flyRTL .55s ease-in-out forwards;
}
@keyframes flyLTR{
0%{left:18%;top:55%;opacity:1;transform:translate(-50%,-50%) scale(.75) rotate(0deg)}
45%{left:50%;top:35%;opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(180deg)}
100%{left:82%;top:55%;opacity:0;transform:translate(-50%,-50%) scale(.75) rotate(360deg)}
}
@keyframes flyRTL{
0%{left:82%;top:55%;opacity:1;transform:translate(-50%,-50%) scale(.75) rotate(0deg)}
45%{left:50%;top:35%;opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(-180deg)}
100%{left:18%;top:55%;opacity:0;transform:translate(-50%,-50%) scale(.75) rotate(-360deg)}
}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.ping{margin-top:120px;border-radius:24px;background:rgba(255,255,255,.82);padding:10px 18px;font-size:clamp(16px,1.8vw,22px);color:#059669;font-weight:1000;box-shadow:0 6px 18px #0002}
.phase{position:absolute;bottom:26px;z-index:3;border:4px solid #fff;border-radius:999px;background:#ffffffe0;color:#059669;padding:10px 18px;font-size:clamp(16px,1.8vw,24px);font-weight:1000;text-align:center}
.endMsg,.endScore{margin:18px 0;font-size:clamp(24px,3.5vw,40px);color:#1e3a8a;font-weight:1000}
@media(max-height:720px){.card{padding:12px}.panel{padding:10px}.main{height:58px}.taskCard{min-height:290px}.ans{height:82px}.phase{bottom:14px}.fb{font-size:22px}}
@media(max-width:900px){.tableBtns{grid-template-columns:repeat(5,1fr)}.timeBtns{grid-template-columns:repeat(2,1fr)}.info{grid-template-columns:1fr}}

@media (max-width: 950px) and (orientation: landscape) {
  .start { padding: 1vh 1vw; }
  .card { height: 98vh; width: 99vw; border-width: 4px; border-radius: 24px; padding: 8px; }
  h1 { font-size: clamp(24px, 5vw, 34px); }
  .subtitle { font-size: clamp(12px, 2.2vw, 16px); margin-top: 3px; }
  .panel { border-radius: 18px; padding: 6px; }
  .panel h2 { font-size: clamp(15px, 2.6vw, 20px); margin-bottom: 4px; }
  .tableBtns { grid-template-columns: repeat(9, 1fr); gap: 4px; }
  .timeBtns { grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .sel, .mode { border-width: 2px; border-radius: 12px; padding: 5px 3px; font-size: clamp(12px, 2.3vw, 16px); box-shadow: 0 3px 0 #0002; }
  .info { grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .info div { border-radius: 14px; padding: 6px 4px; font-size: clamp(11px, 2vw, 14px); }
  .main { height: 40px; border-radius: 18px; font-size: clamp(20px, 3.5vw, 28px); box-shadow: 0 5px 0 #0f766e; }
  .game { padding: 1vh 1vw; }
  .plate { width: 99vw; height: 98vh; border-width: 5px; border-radius: 24px; }
  .side { width: 40vw; min-width: 0; }
  .net { width: 20vw; min-width: 90px; border-left-width: 5px; border-right-width: 5px; }
  .line { width: 4px; }
  .score { top: 6px; min-width: 44px; border-width: 2px; padding: 4px 12px; font-size: clamp(20px, 4vw, 28px); }
  .taskCard { width: 92%; min-height: 180px; border-width: 3px; border-radius: 22px; padding: 10px; }
  .label { font-size: clamp(10px, 2vw, 13px); }
  .task { margin: 8px 0; font-size: clamp(34px, 7vw, 52px); }
  .answers { gap: 6px; }
  .ans { height: 48px; border-width: 2px; border-radius: 16px; font-size: clamp(24px, 5vw, 34px); box-shadow: 0 4px 0 #0002; }
  .wait { height: 130px; font-size: 40px; gap: 6px; }
  .wait span { font-size: clamp(16px, 3vw, 22px); }
  .fb { margin-top: 8px; height: 28px; font-size: clamp(14px, 2.8vw, 19px); }
  .timer { top: 8px; border-width: 2px; padding: 5px 12px; font-size: clamp(18px, 3.5vw, 26px); }
  .ping { margin-top: 72px; border-radius: 14px; padding: 6px 8px; font-size: clamp(11px, 2vw, 15px); }
  .phase { bottom: 8px; border-width: 2px; border-radius: 14px; padding: 5px 8px; font-size: clamp(10px, 1.8vw, 13px); max-width: 18vw; }
  .flyingBall { width: clamp(26px, 4vw, 38px); height: clamp(26px, 4vw, 38px); font-size: clamp(18px, 3vw, 28px); border-width: 2px; }
  .end .card { height: auto; max-height: 96vh; padding: 14px; }
  .endMsg, .endScore { margin: 8px 0; font-size: clamp(18px, 3vw, 26px); }
}



/* iPad 6. Generation / 9.7" im Querformat: 1024 × 768
   Die bisherigen Handy-Regeln greifen erst unter 950px Breite.
   Deshalb werden hier Karten und Ergebnisbuttons kompakter gemacht,
   damit sie nicht über den Rand laufen. */
@media (min-width: 951px) and (max-width: 1100px) and (orientation: landscape) {
  .game { padding: 1.2vh 1vw; }
  .plate {
    width: 99vw;
    height: 97vh;
    border-width: 6px;
    border-radius: 30px;
  }
  .side {
    width: 40vw;
    min-width: 0;
    padding: 0 4px;
  }
  .net {
    width: 20vw;
    min-width: 130px;
    border-left-width: 6px;
    border-right-width: 6px;
  }
  .score {
    top: 8px;
    min-width: 58px;
    border-width: 3px;
    padding: 6px 16px;
    font-size: clamp(22px,3.2vw,32px);
  }
  .taskCard {
    width: min(94%, 430px);
    min-height: 235px;
    border-width: 4px;
    border-radius: 28px;
    padding: 12px;
  }
  .label { font-size: clamp(12px,1.7vw,16px); }
  .task {
    margin: 10px 0;
    font-size: clamp(40px,6vw,58px);
  }
  .answers {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    width: 100%;
  }
  .ans {
    width: 100%;
    min-width: 0;
    height: 58px;
    border-width: 3px;
    border-radius: 18px;
    padding: 0 4px;
    font-size: clamp(24px,3.8vw,36px);
    box-shadow: 0 4px 0 #0002;
  }
  .wait { height: 155px; font-size: 46px; gap: 8px; }
  .wait span { font-size: clamp(18px,2.5vw,25px); }
  .fb {
    margin-top: 8px;
    height: 30px;
    font-size: clamp(15px,2vw,21px);
  }
  .timer {
    top: 10px;
    border-width: 3px;
    padding: 6px 14px;
    font-size: clamp(22px,3vw,30px);
  }
  .ping {
    margin-top: 80px;
    border-radius: 16px;
    padding: 7px 10px;
    font-size: clamp(12px,1.7vw,17px);
  }
  .phase {
    bottom: 10px;
    border-width: 3px;
    border-radius: 16px;
    padding: 6px 8px;
    max-width: 18vw;
    font-size: clamp(11px,1.45vw,15px);
  }
  .flyingBall {
    width: clamp(32px,4vw,44px);
    height: clamp(32px,4vw,44px);
    font-size: clamp(22px,3vw,32px);
    border-width: 3px;
  }
}

@media (max-width: 700px) and (orientation: portrait) {
  body::before {
    content: "Bitte iPhone quer drehen 🏓";
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: linear-gradient(135deg,#67e8f9,#bbf7d0,#fde68a);
    color: #1e3a8a;
    font-size: 32px;
    font-weight: 1000;
  }
}


/* HOTFIX iPad 6/Safari: Die gedrehten Spielerflächen waren so breit wie die
   Tablet-Höhe und wurden links/rechts abgeschnitten. Deshalb werden sie
   nach innen geschoben und die Antwortleiste etwas kompakter gemacht. */
@media (min-width: 900px) and (max-width: 1180px) and (orientation: landscape) {
  html, body { width: 100%; height: 100%; overflow: hidden; }
  .game { padding: 1vh 1vw; }
  .plate { width: 98vw; height: 96vh; overflow: hidden; }

  .side {
    width: 36vw;
    min-width: 0;
  }

  .left {
    transform: translateX(8vw) rotate(90deg);
  }

  .right {
    transform: translateX(-8vw) rotate(-90deg);
  }

  .taskCard {
    width: min(88%, 390px);
    min-height: 215px;
    padding: 10px;
    border-width: 4px;
    border-radius: 26px;
  }

  .task {
    margin: 8px 0;
    font-size: clamp(36px, 5.2vw, 52px);
  }

  .answers {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 5px;
    width: 100%;
  }

  .ans {
    width: 100%;
    min-width: 0;
    height: 52px;
    padding: 0 2px;
    border-width: 2px;
    border-radius: 16px;
    font-size: clamp(22px, 3.2vw, 32px);
    line-height: 1;
  }

  .label { font-size: clamp(11px, 1.45vw, 15px); }
  .wait { height: 145px; }
}


/* FINALFIX iPad 6: Punktestände liegen jetzt direkt auf der Platte statt in den gedrehten Spielerflächen.
   Dadurch können sie sich nicht mehr übereinander schieben. */
@media (min-width: 900px) and (max-width: 1180px) and (orientation: landscape) {
  .plateScore {
    position: absolute;
    top: 10px;
    z-index: 20;
    transform: none;
    min-width: 50px;
    padding: 5px 13px;
    border-width: 3px;
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1;
  }

  .scoreLeft { left: 31%; right: auto; }
  .scoreRight { left: auto; right: 31%; }

  .timer { top: 58px; }
  .ping { margin-top: 112px; }
}

</style>
</head>
<body>
<section id="start" class="start">
  <div class="card">
    <div>
      <h1>🏓 Mathe-Pingpong 🏓</h1>
      <p class="subtitle">Setzt euch links und rechts ans Tablet wie an eine echte Tischtennisplatte!</p>
    </div>

    <div class="panel">
      <h2>Welche Reihen wollt ihr üben?</h2>
      <div id="tableBtns" class="tableBtns"></div>
    </div>

    <div class="panel yellow">
      <h2>Zeitmodus</h2>
      <div class="timeBtns">
        <button class="mode active" data-time="0">Ohne Zeitlimit</button>
        <button class="mode" data-time="5">5 Sekunden</button>
        <button class="mode" data-time="10">10 Sekunden</button>
        <button class="mode" data-time="15">15 Sekunden</button>
        <button class="mode" data-time="20">20 Sekunden</button>
      </div>
    </div>

    <div class="info">
      <div>👦 Spieler links</div>
      <div>🏓 Jeder bekommt gleich viele Bälle</div>
      <div>👧 Spieler rechts</div>
    </div>

    <button id="startBtn" class="main">SPIEL STARTEN</button>
  </div>
</section>

<section id="game" class="game hidden">
  <main class="plate">
    <div id="flyingBall" class="flyingBall">🏓</div>
    <div id="scoreL" class="score plateScore scoreLeft">0</div>
    <div id="scoreR" class="score plateScore scoreRight">0</div>
    <div class="side left">
      <div id="cardL" class="taskCard"></div>
      <div id="fbL" class="fb"></div>
    </div>

    <div class="net">
      <div id="timer" class="timer hidden">⏰ 5</div>
      <div class="line"></div>
      <div class="netbox">
        <div id="netText" class="ping">🏓 Ballwechsel</div>
      </div>
      <div id="phase" class="phase hidden"></div>
    </div>

    <div class="side right">
      <div id="cardR" class="taskCard"></div>
      <div id="fbR" class="fb"></div>
    </div>
  </main>
</section>

<section id="end" class="end hidden">
  <div class="card">
    <div style="font-size:90px">🏆</div>
    <h1 id="winnerText">Spieler gewinnt!</h1>
    <div id="endMsg" class="endMsg"></div>
    <div id="endScore" class="endScore"></div>
    <button id="newRound" class="main">NEUE RUNDE</button>
  </div>
</section>

<script>
const TABLES = [2,3,4,5,6,7,8,9,10];
const WIN = 10;

let selected = [2,3,4,5,10];
let timeLimit = 0;
let timeLeft = 0;
let timerInt = null;

let active = "left";
let task = null;
let score = {left:0, right:0};
let turns = {left:0, right:0};
let feedback = {left:"", right:""};
let resolved = false;
let phase = "normal";

const $ = id => document.getElementById(id);

function randomInt(min,max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(array){
  return [...array].sort(() => Math.random() - 0.5);
}

function makeTask(){
  const secondFactor = selected[randomInt(0, selected.length - 1)];
  const firstFactor = randomInt(2, 10);
  const correct = firstFactor * secondFactor;
  const wrong = new Set();

  while(wrong.size < 2){
    const value = correct + randomInt(-10, 10);
    if(value > 0 && value !== correct) wrong.add(value);
  }

  return {
    q: `${firstFactor} · ${secondFactor}`,
    c: correct,
    ans: shuffle([correct, ...wrong])
  };
}

function show(screen){
  $("start").classList.toggle("hidden", screen !== "start");
  $("game").classList.toggle("hidden", screen !== "game");
  $("end").classList.toggle("hidden", screen !== "end");
}

function renderTables(){
  const box = $("tableBtns");
  box.innerHTML = "";

  TABLES.forEach(table => {
    const button = document.createElement("button");
    button.className = "sel" + (selected.includes(table) ? " active" : "");
    button.textContent = table + "·";
    button.onclick = () => {
      if(selected.includes(table) && selected.length > 1){
        selected = selected.filter(x => x !== table);
      } else if(!selected.includes(table)){
        selected.push(table);
        selected.sort((a,b) => a-b);
      }
      renderTables();
    };
    box.appendChild(button);
  });
}

function renderTimeButtons(){
  document.querySelectorAll(".mode").forEach(button => {
    const value = Number(button.dataset.time);
    button.classList.toggle("active", value === timeLimit);
  });
}

function renderCard(side){
  const isActive = active === side;
  const card = side === "left" ? $("cardL") : $("cardR");
  card.className = "taskCard" + (isActive ? " active" : "");

  if(isActive){
    card.innerHTML = `
      <div class="label">Tippe die richtige Antwort!</div>
      <div class="task">${task.q}</div>
      <div class="answers">
        ${task.ans.map(answer => `<button class="ans" data-answer="${answer}">${answer}</button>`).join("")}
      </div>
    `;

    card.querySelectorAll(".ans").forEach(button => {
      button.onclick = () => answer(Number(button.dataset.answer));
    });
  } else {
    card.innerHTML = `
      <div class="label">Warte auf den Ball</div>
      <div class="wait"><div>🏓</div><span>Bereit machen!</span></div>
    `;
  }
}

function renderPhase(){
  if(phase === "sudden"){
    $("netText").textContent = "Fehler entscheidet!";
    $("phase").textContent = "Gleichstand: Wer jetzt einen Fehler macht, verliert.";
    $("phase").classList.remove("hidden");
  } else if(phase === "final"){
    $("netText").textContent = "Letzter Ball!";
    $("phase").textContent = "Der Gegenspieler bekommt noch einen fairen letzten Ball.";
    $("phase").classList.remove("hidden");
  } else {
    $("netText").textContent = "Ping! Pong!";
    $("phase").classList.add("hidden");
  }
}

function render(){
  $("scoreL").textContent = score.left;
  $("scoreR").textContent = score.right;
  $("fbL").textContent = feedback.left || "";
  $("fbR").textContent = feedback.right || "";

  renderCard("left");
  renderCard("right");

  $("timer").classList.toggle("hidden", timeLimit === 0);
  $("timer").textContent = `⏰ ${timeLeft}`;

  renderPhase();
}

function startTimer(){
  clearInterval(timerInt);

  if(timeLimit === 0){
    timeLeft = 0;
    render();
    return;
  }

  timeLeft = timeLimit;
  render();

  timerInt = setInterval(() => {
    if(resolved) return;

    timeLeft -= 1;
    render();

    if(timeLeft <= 0){
      resolve(false, true);
    }
  }, 1000);
}

function startGame(){
  score = {left:0, right:0};
  turns = {left:0, right:0};
  feedback = {left:"Los geht's!", right:""};
  phase = "normal";
  resolved = false;
  active = Math.random() > 0.5 ? "left" : "right";
  task = makeTask();
  timeLeft = timeLimit;
  show("game");
  render();
  startTimer();
}

function toStart(){
  clearInterval(timerInt);
  feedback = {left:"", right:""};
  phase = "normal";
  resolved = false;
  timeLeft = timeLimit;
  show("start");
  renderTables();
  renderTimeButtons();
}

function finish(winner, message){
  clearInterval(timerInt);
  $("winnerText").textContent = `Spieler ${winner === "left" ? "links" : "rechts"} gewinnt!`;
  $("endMsg").textContent = message;
  $("endScore").textContent = `Links ${score.left} : ${score.right} Rechts`;
  show("end");
}

function checkEnd(updatedScore, updatedTurns, player, other, wasCorrect){
  const equalTurns = updatedTurns.left === updatedTurns.right;
  const reachedTarget = updatedScore.left >= WIN || updatedScore.right >= WIN;

  if(phase === "sudden"){
    if(!wasCorrect){
      finish(other, `Spieler ${other === "left" ? "links" : "rechts"} gewinnt, weil der Gegner einen Fehler gemacht hat!`);
      return true;
    }

    feedback[player] = "🏓 Richtig! Weiter geht's!";
    feedback[other] = "Fehler entscheidet!";
    return false;
  }

  if(reachedTarget && equalTurns){
    if(updatedScore.left > updatedScore.right){
      finish("left", "Klarer Sieg für Spieler links! 🎉");
      return true;
    }

    if(updatedScore.right > updatedScore.left){
      finish("right", "Klarer Sieg für Spieler rechts! 🎉");
      return true;
    }

    phase = "sudden";
    feedback = {
      left: "Gleichstand! Fehler entscheidet!",
      right: "Gleichstand! Fehler entscheidet!"
    };
    return false;
  }

  if(reachedTarget && !equalTurns){
    phase = "final";
    feedback[player] = "10 Punkte! Der Gegner bekommt noch einen letzten Ball.";
    feedback[other] = "Letzter Ball zum Ausgleich!";
    return false;
  }

  return false;
}

function animateBall(from,to){
  const ball=$("flyingBall");
  ball.className="flyingBall";
  void ball.offsetWidth;
  if(from==="left" && to==="right"){
    ball.classList.add("flyLeftToRight");
  }else if(from==="right" && to==="left"){
    ball.classList.add("flyRightToLeft");
  }
}

function nextTurn(other, delay){
  animateBall(active, other);
  setTimeout(() => {
    active = other;
    task = makeTask();
    resolved = false;
    render();
    startTimer();
  }, delay);
}

function resolve(correct, timeout = false){
  if(resolved) return;
  resolved = true;
  clearInterval(timerInt);

  const player = active;
  const other = player === "left" ? "right" : "left";

  const updatedTurns = {...turns, [player]: turns[player] + 1};
  const updatedScore = {...score};

  if(phase === "sudden"){
    if(!correct) updatedScore[other] += 1;
  } else if(correct){
    updatedScore[player] += 1;
  } else {
    updatedScore[other] += 1;
  }

  turns = updatedTurns;
  score = updatedScore;

  if(phase !== "sudden"){
    if(correct){
      feedback[player] = "🏓 Super!";
      feedback[other] = "Der Ball kommt!";
    } else {
      feedback[player] = timeout ? "⏰ Zu langsam!" : `❌ ${task.c} wäre richtig!`;
      feedback[other] = "🎉 Punkt für dich!";
    }
  }

  render();

  const ended = checkEnd(updatedScore, updatedTurns, player, other, correct);
  render();

  if(ended) return;

  nextTurn(other, correct ? 450 : 750);
}

function answer(value){
  resolve(value === task.c, false);
}

document.querySelectorAll(".mode").forEach(button => {
  button.onclick = () => {
    timeLimit = Number(button.dataset.time);
    renderTimeButtons();
  };
});

$("startBtn").onclick = startGame;
$("newRound").onclick = toStart;

renderTables();
renderTimeButtons();
show("start");
</script>
</body>
</html>
